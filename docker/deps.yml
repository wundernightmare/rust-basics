# Local development dependencies for the data services (tasks + consumer).
#
# Services:
#   valkey     — Valkey 9 (Redis-compatible)   localhost:6379
#   redpanda   — Redpanda (Kafka API broker)   localhost:9092
#
# There is no database here on purpose — this workspace keeps Valkey as the
# tasks store (no Postgres, unlike the Go sibling).
#
# Usage (from the master worktree root):
#   just infra-up      |  docker compose -f docker/deps.yml up -d
#   just infra-down    |  docker compose -f docker/deps.yml down -v
#
# App config for HOST processes (e.g. `just tasks run`):
#   TASKS_VALKEY_URL    redis://localhost:6379
#   TASKS_KAFKA_BROKERS localhost:9092
#
# Containers on this network reach the broker at redpanda:29092 (the INTERNAL
# listener); host processes use the localhost:9092 HOST listener. See
# docker/stack.yml for the in-network app wiring.

name: rust-basics-deps

services:
  valkey:
    image: valkey/valkey:9.0
    container_name: rust-basics-valkey
    restart: unless-stopped
    command: ["valkey-server", "--save", "60", "1", "--loglevel", "notice"]
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v26.1.1
    container_name: rust-basics-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --node-id=0
      - --check=false
      # Auto-create topics on first produce/subscribe — the app's tasks.events
      # topic is not pre-provisioned (convenient for a demo/dev broker).
      - --set
      - redpanda.auto_create_topics_enabled=true
      # Two Kafka listeners: INTERNAL (advertised as redpanda:29092 for app
      # containers) and HOST (advertised as localhost:9092 for host processes).
      - --kafka-addr
      - INTERNAL://0.0.0.0:29092,HOST://0.0.0.0:9092
      - --advertise-kafka-addr
      - INTERNAL://redpanda:29092,HOST://localhost:9092
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - redpanda:33145
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
    ports:
      - "9092:9092" # host → HOST listener (advertised as localhost:9092)
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health -X brokers=localhost:9092 2>/dev/null | grep -qiE 'Healthy:\\s+true'"]
      interval: 10s
      timeout: 10s
      retries: 15

volumes:
  valkey_data:
  redpanda_data:
