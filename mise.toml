# mise tool versions for local development (inherited from tracehub-edge).
#
# The Rust toolchain is pinned in `rust-toolchain.toml` (read by rustup);
# declaring it here too gets `rustc` / `cargo` shims without a shell hook. Node
# is needed by the e2e Playwright suite; k6 drives the benchmarks.
#
# AppSec toolchain (semgrep / gitleaks / osv-scanner / hadolint) is installed by
# `just setup-sec`; checks run via `just sec`. Versions mirror tracehub-edge so
# the repos drift together.

[tools]
rust = "1.95"
node = "24.15"
k6   = "0.56.0"

# Optional Rust build cache — shared across clones / worktrees. Pinned here so
# `mise install` provides the binary; the WIRING (`rustc-wrapper`) lives in the
# container-root .cargo/config.toml and is deliberately NOT committed (a
# repo-level wrapper would also turn sccache on in CI, where the cache is cold
# every run). See README "Worktrees".
sccache = "0.15.0"

# AppSec — pinned for reproducibility. Bump here, then re-run `just setup-sec`.
# Each `just sec-*` recipe invokes its tool via `mise exec --`.
semgrep     = "1.163.0"
gitleaks    = "8.30.1"
osv-scanner = "2.3.8"
hadolint    = "2.14.0"

# Container CVE / SBOM — used by `just docker-scan` / `docker-scan-ci`.
syft  = "1.44.0"
grype = "0.112.0"

# Supply-chain signing — cosign in key-mode with `--tlog-upload=false`.
cosign = "3.0.6"
