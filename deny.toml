# cargo-deny configuration (inherited from tracehub-edge, trimmed).
# https://embarkstudios.github.io/cargo-deny/
#
# Run:  cargo deny check            (from workspace root, via `just deny`)
#       cargo deny check licenses   (single category)

# ── Advisories ────────────────────────────────────────────────────────────────
# Checks against the RustSec advisory database (https://rustsec.org/).
[advisories]
unmaintained            = "workspace"   # only fail for workspace-owned crates
unsound                 = "all"         # UB is never acceptable
yanked                  = "warn"
unused-ignored-advisory = "warn"
# Each ignore MUST cite the affected dep path and a removal trigger.
ignore = [
    # astral-tokio-tar (tar extraction) + rustls-pemfile are pulled ONLY by the
    # `testcontainers` dev-dependency (it unpacks/streams container images for the
    # integration tests). They never enter a shipped binary — the distroless
    # images contain just the service binary. testcontainers 0.25.2 pins
    # astral-tokio-tar "^0.5.6" (can't move to the fixed 0.6.x) and bollard pulls
    # rustls-pemfile 2.2.0.
    # REMOVE WHEN: testcontainers / bollard bump past these (astral-tokio-tar
    # >=0.6.2, rustls-pemfile dropped) — then drop the matching ids here.
    "RUSTSEC-2026-0066", # astral-tokio-tar PAX path confusion
    "RUSTSEC-2026-0112", # astral-tokio-tar symlink traversal
    "RUSTSEC-2026-0113", # astral-tokio-tar resource exhaustion
    "RUSTSEC-2026-0145", # astral-tokio-tar PAX header smuggling
    "RUSTSEC-2025-0134", # rustls-pemfile unmaintained (folded into rustls)
]

# ── Licenses ──────────────────────────────────────────────────────────────────
[licenses]
# All workspace crates are proprietary (publish = false); skip licence check.
private.ignore = true
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",              # Boost — permissive, build-dep only
    "CDLA-Permissive-2.0", # webpki-roots (via rustls TLS stack)
    "CC0-1.0",             # tiny-keccak etc. (ahash transitive)
]

# ── Bans ────────────────────────────────────────────────────────────────────
[bans]
multiple-versions   = "warn"   # duplicate transitive versions: warn, don't block
wildcards           = "deny"   # no `version = "*"` in our manifests…
allow-wildcard-paths = true    # …except internal path deps (httpx, ratelimit, …)

# ── Sources ────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
