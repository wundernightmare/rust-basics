# cargo-deny configuration (inherited from tracehub-edge, trimmed).
# https://embarkstudios.github.io/cargo-deny/
#
# Run:  cargo deny check            (from workspace root, via `just deny`)
#       cargo deny check licenses   (single category)

# ── Advisories ────────────────────────────────────────────────────────────────
# Checks against the RustSec advisory database (https://rustsec.org/).
[advisories]
unmaintained            = "workspace"   # only fail for workspace-owned crates
unsound                 = "all"         # UB is never acceptable
yanked                  = "warn"
unused-ignored-advisory = "warn"
# Each ignore MUST cite the affected dep path and a removal trigger.
ignore = []

# ── Licenses ──────────────────────────────────────────────────────────────────
[licenses]
# All workspace crates are proprietary (publish = false); skip licence check.
private.ignore = true
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]

# ── Bans ────────────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"   # duplicate transitive versions: warn, don't block
wildcards         = "deny"   # no `version = "*"` in our manifests

# ── Sources ────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
