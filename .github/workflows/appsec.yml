name: appsec

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for gitleaks
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  sast:
    runs-on: ubuntu-latest
    container: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci --config p/owasp-top-ten --config p/rust

  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      # google/osv-scanner-action is a reusable workflow, not a step action, so
      # install the pinned scanner binary directly and run it.
      - run: go install github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.3.8
      - run: osv-scanner scan --config=osv-scanner.toml --recursive .

  # Run cargo-deny on a normal (gnu) runner via install-action rather than the
  # EmbarkStudios container action: that container is musl, so rust-toolchain.toml's
  # `channel = "1.95"` resolves to an uninstalled `1.95-…-musl` toolchain and
  # cargo metadata fails. On the gnu runner rustup auto-installs 1.95.
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check advisories bans licenses sources

  hadolint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile: [crates/ping/Dockerfile, crates/heartbeat/Dockerfile]
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          config: .hadolint.yaml
          failure-threshold: error # the action's default ("info") overrides the config; pin it
